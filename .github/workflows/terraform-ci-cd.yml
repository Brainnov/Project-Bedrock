name: Terraform CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  AWS_REGION: eu-west-1
  TERRAFORM_VERSION: 1.5.7
  CLUSTER_NAME: project-bedrock-eks

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
    - name: Mask sensitive values in logs
      run: |
        echo "::add-mask::${{ secrets.AWS_ACCESS_KEY_ID }}"
        echo "::add-mask::${{ secrets.AWS_SECRET_ACCESS_KEY }}"

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Format
      id: fmt
      run: terraform fmt -check
      working-directory: ./terraform

    - name: Terraform Init
      id: init
      run: terraform init
      working-directory: ./terraform

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      working-directory: ./terraform

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -input=false -out=plan.tfplan
      working-directory: ./terraform
      continue-on-error: true

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Upload Terraform Plan
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v3
      with:
        name: terraform-plan
        path: terraform/plan.tfplan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: |
        terraform apply -auto-approve -input=false
        # Configure kubectl and verify deployment
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
        kubectl get nodes
        kubectl get pods -A
        echo "UI Service URL:"
        kubectl get svc ui -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      working-directory: ./terraform

    - name: Output Application URL
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
        UI_URL=$(kubectl get svc ui -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "Not available yet")
        echo "Application UI URL: http://$UI_URL"
        echo "ui_url=$UI_URL" >> $GITHUB_ENV
      working-directory: ./terraform